site_name: TWISTED
site_description: TWin domain model Integrating Supercoiling from Transcription-topoisomerase Dynamics
site_url: https://st35.github.io/TWISTED/
repo_url: https://github.com/st35/TWISTED
repo_name: st35/TWISTED

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials: tutorials.md
  - User Guide:
    - Overview: user-guide/overview.md
    - Genomic Setup: user-guide/genomic-setup.md
    - Model Parameters: user-guide/model-setup.md
    - Binding Proteins: user-guide/binding-proteins.md
    - Running Simulations: user-guide/simulation.md
    - Supercoiling Relaxation Modes: user-guide/relaxation-modes.md
    - Events and Propensities: user-guide/events-and-propensities.md
    - Not Yet Implemented: user-guide/not-yet-implemented.md
  - Theory:
    - DNA Mechanics: theory/dna-mechanics.md
  - API Reference:
    - Overview: api/index.md
    - model_setup: api/model-setup.md
    - biol_methods: api/biol-methods.md
    - model_dynamics: api/model-dynamics.md
    - simulate_dynamics: api/simulate-dynamics.md
    - utilities: api/utilities.md
  - How to cite: citations.md
